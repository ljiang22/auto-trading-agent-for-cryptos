<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="track" x1="120" y1="240" x2="840" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444"/>
      <stop offset="0.5" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="1000" height="420" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="880" height="280" rx="20" fill="#0B1220" opacity="0.65" filter="url(#soft)"/>
  <text x="90" y="95" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" fill="#E5E7EB">
    Sentiment Gauge (Demo)
  </text>
  <text x="90" y="125" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#9CA3AF">
    Illustrative only — not real-time market data.
  </text>

  <!-- Track -->
  <rect x="120" y="190" width="720" height="26" rx="13" fill="url(#track)"/>
  <rect x="120" y="190" width="720" height="26" rx="13" fill="none" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- Labels -->
  <text x="120" y="255" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#FCA5A5">
    Fear
  </text>
  <text x="468" y="255" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#FCD34D">
    Neutral
  </text>
  <text x="792" y="255" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#86EFAC">
    Greed
  </text>

  <!-- Needle (set to 62/100) -->
  <g transform="translate(0 0)">
    <!-- 62% of 720px = 446.4px offset from 120 -->
    <circle cx="566.4" cy="203" r="18" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.25"/>
    <path d="M566.4 156 L556.4 196 L576.4 196 Z" fill="#E5E7EB" opacity="0.9"/>
    <text x="566.4" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="44" fill="#E5E7EB">
      62
    </text>
    <text x="566.4" y="340" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="#9CA3AF">
      (demo score)
    </text>
  </g>
</svg>
