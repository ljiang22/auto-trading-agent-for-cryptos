# Nginx Configuration for Server-Sent Events (SSE) Streaming
# 
# This configuration template is optimized for the SentiEdge Agent
# streaming endpoints to prevent connection drops and buffering issues.
#
# Usage:
# 1. Copy this configuration to your Nginx sites-available directory
# 2. Update the server_name and proxy_pass URLs to match your setup
# 3. Include this in your main Nginx configuration

server {
    listen 80;
    listen [::]:80;
    server_name agent.sentiedge.org;  # Update to your domain
    
    # Redirect HTTP to HTTPS (recommended for production)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agent.sentiedge.org;  # Update to your domain
    
    # SSL configuration (update paths to your certificates)
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # General settings
    client_max_body_size 100M;  # Allow large file uploads
    
    # Serve static files directly
    location /media/ {
        alias /path/to/your/app/data/;  # Update to your media path
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /charts/ {
        alias /path/to/your/app/saved_data/;  # Update to your charts path
        expires 1h;
        add_header Cache-Control "public";
    }
    
    # API endpoints - optimized for SSE streaming
    location /api/ {
        proxy_pass http://localhost:3000;  # Update to your backend URL
        
        # Essential headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CRITICAL: Disable buffering for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        
        # SSE-specific timeouts (increased for long-running analysis)
        proxy_read_timeout 600s;       # 10 minutes for complex analysis
        proxy_connect_timeout 75s;     # Connection timeout
        proxy_send_timeout 600s;       # Send timeout
        
        # HTTP version and connection settings for streaming
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        
        # Disable chunked transfer encoding buffering
        chunked_transfer_encoding off;
        
        # CORS headers (adjust origin as needed)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, DELETE' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header Access-Control-Allow-Credentials true always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, DELETE';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Frontend application (if serving static files)
    location / {
        root /path/to/your/client/dist;  # Update to your client build path
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Rate limiting for API endpoints (adjust as needed)
http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    
    server {
        # ... (server configuration above)
        
        location /api/ {
            limit_req zone=api burst=10;
            # ... (rest of API configuration)
        }
    }
}